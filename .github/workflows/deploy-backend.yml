# Deploy the FastAPI backend to Azure Container Apps.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS       Service principal JSON from `az ad sp create-for-rbac`
#   ACR_LOGIN_SERVER        e.g. moneypennyacr.azurecr.io
#   ACR_USERNAME            From `az acr credential show -n <acr-name>`
#   ACR_PASSWORD            From `az acr credential show -n <acr-name>`
#   AZURE_CONTAINER_APP_NAME  e.g. money-penny-api
#   AZURE_RESOURCE_GROUP      e.g. money-penny-rg
#
# Create a service principal (Contributor on the resource group):
#   az ad sp create-for-rbac \
#     --name money-penny-github \
#     --role contributor \
#     --scopes /subscriptions/<sub-id>/resourceGroups/<rg-name> \
#     --sdk-auth
#
# Paste the full JSON output into AZURE_CREDENTIALS.
#
# App env vars (GOOGLE_CLIENT_ID, CORS_ORIGINS, etc.) are managed on the
# Container App itself — not in this workflow. Set them once with:
#   az containerapp update -g <rg> -n <app> --set-env-vars ...

name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: money-penny-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.sha }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" ./backend
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "IMAGE_TO_DEPLOY=${IMAGE}:${TAG}" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.IMAGE_TO_DEPLOY }}
