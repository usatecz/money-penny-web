# Deploy the FastAPI backend to Azure Container Apps.
#
# Uses the OIDC + registry secrets created by Azure Portal continuous deployment
# (prefix MONEYPENNYAPI_*). App env vars (GOOGLE_CLIENT_ID, CORS_ORIGINS, …)
# stay on the Container App — set them with `az containerapp update`.

name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  RESOURCE_GROUP: money-penny-rg
  CONTAINER_APP_NAME: money-penny-api
  IMAGE_NAME: money-penny-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MONEYPENNYAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MONEYPENNYAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MONEYPENNYAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure Container Registry
        id: acr
        run: |
          NAME=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          SERVER=$(az acr list -g "$RESOURCE_GROUP" --query "[0].loginServer" -o tsv)
          if [ -z "$NAME" ] || [ -z "$SERVER" ]; then
            echo "No Azure Container Registry found in resource group $RESOURCE_GROUP"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "Using ACR: $SERVER"

      - name: Build and deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          acrName: ${{ steps.acr.outputs.name }}
          registryUrl: ${{ steps.acr.outputs.login_server }}
          registryUsername: ${{ secrets.MONEYPENNYAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MONEYPENNYAPI_REGISTRY_PASSWORD }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToBuild: ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
