name: Trigger auto deployment for money-penny-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/money-penny-api-AutoDeployTrigger-b3bc45a7-46e7-4076-b631-408370d2cdf8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MONEYPENNYAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MONEYPENNYAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MONEYPENNYAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.MONEYPENNYAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MONEYPENNYAPI_REGISTRY_PASSWORD }}
          containerAppName: money-penny-api
          resourceGroup: money-penny-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


